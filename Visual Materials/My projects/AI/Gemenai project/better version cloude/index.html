<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapFolio - Google Maps Saved Places</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-container">
        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="header-top">
                    <h1>📍 MapFolio</h1>
                    <button id="theme-toggle" class="theme-toggle-btn" title="Toggle Theme">🌓</button>
                </div>
                <p>Organize your saved places.</p>
            </header>

            <section class="search-section">
                <div class="search-input-wrapper" style="position:relative;">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="local-search-input" placeholder="Search your places or find new ones..." class="search-input local-search" autocomplete="off" />
                    <div id="place-search-dropdown" class="place-search-dropdown hidden"></div>
                </div>
            </section>

            <section class="upload-section">
                <label for="file-upload" class="import-btn">
                    <span class="import-btn-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    </span>
                    <span class="import-btn-text">
                        <span class="import-btn-title">Import Places</span>
                        <span class="import-btn-hint">JSON · KMZ / KML · CSV</span>
                    </span>
                </label>
                <input id="file-upload" type="file" accept=".json,.kmz,.kml,.csv" multiple style="display: none;" />
            </section>

            <section class="filters-section section-block">
                <h3>Filters</h3>
                <div class="filters-container">
                    <div class="filter-group">
                        <label for="filter-category">Category</label>
                        <select id="filter-category">
                            <option value="All">All Categories</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="filter-status">Status</label>
                        <select id="filter-status">
                            <option value="All">All Statuses</option>
                            <option value="Favourite">Favourite ⭐</option>
                            <option value="Want to Go">Want to Go 🔵</option>
                            <option value="Been There">Been There 🟡</option>
                            <option value="Loved It">Loved It 🟢</option>
                            <option value="Meh">Meh 🟠</option>
                            <option value="Skip It">Skip It 🔴</option>
                            <option value="Unsorted">Unsorted ⚪</option>
                        </select>
                    </div>
                </div>
            </section>

          <section class="folders-section section-block">
    <div class="section-header-row">
        <h3>Folders</h3>
        <button id="add-folder-btn" class="icon-action-btn" title="Create New Folder">➕</button>
    </div>
    <div class="folder-search-wrapper" style="margin: 0.5rem 0; width: 100%;">
        <input type="text" id="folder-search-input" placeholder="Search folders..." class="search-input" style="padding: 0.4rem 0.6rem; font-size: 0.8rem; width: 100%; box-sizing: border-box;" autocomplete="off" />
    </div>
    <ul id="folders-list" class="folders-list inline-scroll" style="list-style: none; padding: 0; margin: 0;"></ul>
</section>
            <div id="unpinned-section" class="unpinned-section hidden">
                <div id="unpinned-header" class="unpinned-header">
                    <span>⚠️ Unpinned places</span>
                    <span id="unpinned-count" class="unpinned-count">0</span>
                </div>
                <ul id="unpinned-list" class="unpinned-list hidden"></ul>
            </div>

            <div class="sidebar-footer">
                <span id="places-footer">📍 0 places</span>
            </div>
        </aside>

        <section class="map-container">
            <div id="map"></div>
            
            <div id="triage-panel" class="triage-panel hidden">
                <button id="close-triage" class="close-btn">&times;</button>
                <input type="text" id="triage-title" class="triage-title-input" placeholder="Place Name" />
                <input type="text" id="triage-address" class="triage-address-input" placeholder="Address" />
                
                <div class="gmaps-link-container">
                    <a id="triage-url" href="#" target="_blank" class="triage-link">🌐 View on Google Maps →</a>
                </div>
                
                <div class="triage-form">
                    <div class="coordinates-row" style="display: flex; gap: 0.5rem; width: 100%;">
                        <div class="form-group" style="flex: 1;">
                            <label>Latitude</label>
                            <input type="text" id="triage-lat" placeholder="e.g. 37.1028" class="search-input" style="padding: 0.4rem;" />
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>Longitude</label>
                            <input type="text" id="triage-lng" placeholder="e.g. -8.6732" class="search-input" style="padding: 0.4rem;" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label style="display:flex; justify-content:space-between; align-items:center;">
                            Category
                            <button id="add-category-btn" class="icon-action-btn" title="Manage custom categories" style="font-size:0.8rem;">➕ New</button>
                        </label>
                        <select id="triage-category">
                            <option value="Unassigned">Select a Category</option>
                        </select>
                        <div id="custom-categories-list" class="custom-categories-list hidden"></div>
                    </div>
                    <div class="form-group">
                        <label>Visits Tracker Status</label>
                        <select id="triage-status">
                            <option value="Unsorted">⚪ Unsorted</option>
                            <option value="Favourite">⭐ Favourite</option>
                            <option value="Want to Go">🔵 Want to Go</option>
                            <option value="Been There">🟡 Been There</option>
                            <option value="Loved It">🟢 Loved It</option>
                            <option value="Meh">🟠 Meh</option>
                            <option value="Skip It">🔴 Skip It</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Assigned Folder Source</label>
                        <select id="triage-folder">
                            <option value="Uncategorized">Uncategorized / General</option>
                        </select>
                    </div>
                </div>

                <div style="display: flex; gap: 0.5rem; margin-top: 0.75rem;">
                    <button id="save-coords-btn" class="action-btn save-modifications-btn">💾 Save layout modifications</button>
                </div>

                <button id="delete-place-btn" class="delete-place-btn">🗑️ Delete spot from database</button>

                <div id="delete-confirm" class="delete-confirm hidden">
                    <p>Confirm entry elimination?</p>
                    <div class="delete-confirm-buttons">
                        <button id="confirm-delete-btn" class="action-btn confirm-yes-btn">Yes</button>
                        <button id="cancel-delete-btn" class="action-btn confirm-no-btn">No</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="script.js"></script>
</body>
</html>
